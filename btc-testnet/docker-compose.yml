services:
  bitcoind:
    image: ${BITCOIN_IMAGE:-bitcoin/bitcoin:31.0}
    container_name: bitcoind-signet
    restart: unless-stopped
    stop_grace_period: 60s
    ports:
      # Signet P2P：容器内 38333（与 chain 默认一致）
      - "${P2P_PORT:-38333}:38333"
      # Signet RPC：容器内 38332；绑定见 .env 的 RPC_BIND_ADDR
      - "${RPC_BIND_ADDR:-127.0.0.1}:${RPC_PORT:-38332}:38332"
    volumes:
      - bitcoin_data:/home/bitcoin/.bitcoin
      # 勿加 :ro；勿用 -conf 指向其他路径（Core 31+ 会因 datadir 残留配置报错）
      - ./config/bitcoin.conf:/home/bitcoin/.bitcoin/bitcoin.conf
    command: -printtoconsole
    healthcheck:
      test:
        [
          "CMD",
          "bitcoin-cli",
          "-datadir=/home/bitcoin/.bitcoin",
          "-chain=signet",
          "-rpcwait",
          "getblockchaininfo",
        ]
      interval: 60s
      timeout: 15s
      retries: 5
      start_period: 180s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

volumes:
  bitcoin_data:
    name: btc-testnet-data
